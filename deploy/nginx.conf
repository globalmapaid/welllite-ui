# Container nginx — serves the built SPA only.
# /api requests never reach this container: the HOST nginx routes /api to
# welllite-api (127.0.0.1:8001) and everything else here (127.0.0.1:8002).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: serve index.html for any unmatched path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entrypoint, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
